version: 2

project_name: sessionport

before:
  hooks:
    - go test ./...

builds:
  - id: sessionport
    main: ./cmd/sessionport
    binary: sessionport
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X sessionport/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: sessionport
    builds:
      - sessionport
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  use: git
  sort: asc

release:
  draft: false
  prerelease: auto
