version: 2

project_name: work-bridge

before:
  hooks:
    - go test ./...

builds:
  - id: work-bridge
    main: ./cmd/work-bridge
    binary: work-bridge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/jaeyoung0509/work-bridge/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: work-bridge
    builds:
      - work-bridge
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  use: git
  sort: asc

release:
  draft: false
  prerelease: auto
